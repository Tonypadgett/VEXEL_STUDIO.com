<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEXEL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #050508;
            --accent-blue: #00d2ff;
            --accent-purple: #9d50bb;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            background-image: radial-gradient(circle at center, #1a1a2e 0%, #050508 100%);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 800px; /* Increased container width */
        }

        .logo-container img {
            /* BIGGER AND LONGER SETTINGS */
            width: 350px; 
            height: auto;
            transform: scaleX(1.15); /* Stretches the logo horizontally */
            
            filter: drop-shadow(0 0 40px rgba(0, 210, 255, 0.5));
            animation: float 4s ease-in-out infinite;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 4.5rem;
            letter-spacing: 8px;
            margin: 0;
            text-transform: uppercase;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff 30%, #555 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 1.2rem;
            color: #888;
            margin: 10px 0 30px 0;
            letter-spacing: 2px;
        }

        .status-badge {
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid rgba(0, 210, 255, 0.3);
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 0.85rem;
            display: inline-block;
            margin-bottom: 40px;
            color: var(--accent-blue);
            text-transform: uppercase;
            font-weight: bold;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 35px;
            font-size: 2rem;
        }

        .social-links a {
            color: white;
            transition: all 0.3s ease;
            opacity: 0.6;
        }

        .social-links a:hover {
            color: var(--accent-blue);
            transform: scale(1.2);
            opacity: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scaleX(1.15); }
            50% { transform: translateY(-25px) scaleX(1.15); }
        }

        @media (max-width: 480px) {
            .logo-container img { width: 250px; }
            h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <img src="logo.jpg" alt="VEXEL Logo">
        </div>

        <h1>VEXEL</h1> 
        <p class="tagline">COMING SOON</p>
        
        <div class="status-badge">
            <i class="fas fa-microchip"></i> Alpha Phase Incoming
        </div>

        <div class="social-links">
            <a href="https://www.youtube.com/@VEXEL_STUDIO-o6e" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://discord.gg/TUmHvQCT" target="_blank"><i class="fab fa-discord"></i></a>
        </div>
    </div>

</body>
</html>
